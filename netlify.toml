[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Firebase Web API keys são públicas por design (segurança via Auth + Firestore Rules).
  # Whitelist do scanner pra esse valor específico.
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY"
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyCgQoZZPvC5EqfjtXhVNyBGgWTzqQ6rfO0"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
